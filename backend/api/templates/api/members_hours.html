{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="{% static 'css/letter-p.png' %}">
    <title>Monthly Members Hours</title>

    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <link rel="stylesheet" href="{% static 'css/darkstyles.css' %}" id="darkTheme" disabled>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/plugins/monthSelect/style.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/plugins/monthSelect/index.js"></script>
    <script src="{% static 'api/monthPickers.js' %}"></script>
    <script src="{% static 'api/settingsMenu.js' %}"></script>

    <script>
        window.canSeeJurnal = {{ can_see_jurnal|yesno:"true,false" }};
    </script>
    <script src="{% static 'api/auth.js' %}"></script>
</head>

<body>

<header class="topbar">
    <h1 class="app-title">Pontaj App</h1>

    <div id="authArea" class="auth-area">
        <button onclick="window.location.href='/api/app'" class="home-btn">
            <img src="{% static 'icons/home.png' %}" alt="Home" class="home-icon">
        </button>
        <span id="authUser" class="auth-user"></span>
        <span id="authRole" class="auth-role"></span>
        <div class="settings-menu">
            <button type="button" class="settings-btn" aria-label="Settings">
                <img src="{% static 'icons/user-gear-solid_light_small.png' %}"
                     alt="Settings"
                     class="settings-icon">
            </button>
            <div class="settings-dropdown">
                <a href="{% url 'password_reset' %}" class="settings-item">
                    <img src="{% static 'icons/key-solid-small.png' %}" alt="Change Password" class="settings-dropdown-icon">
                    Schimbă parola
                </a>
                <div class="settings-divider"></div>
                <button type="button" class="settings-item" data-action="toggle-theme">Dark mode: Off</button>
            </div>
        </div>
        <button class="logout-btn" id="logoutBtn">
            <img src="{% static 'icons/logout.png' %}" alt="Logout" class="logout-icon">
        </button>
    </div>
</header>

<div class="entries-layout">
    <div class="members-entries-card">
        <h2>Pontajul Lunar</h2>

        <div class="filters-row">
            <div class="form-group">
                <label for="lab">Lab</label>
                <select id="lab"></select>
            </div>

            <div class="form-group">
                <label for="monthSelect">Month</label>
                <input type="text" id="monthSelect" data-month-picker="true">
            </div>
        </div>

        <div id="membersHoursTable"></div>
    </div>
</div>

<footer>
    © 2026 Pontaj App · Built for lab tracking in IPCEI project
</footer>

<script src="{% static 'api/membersHoursPage.js' %}"></script>
<script>
    document.addEventListener("DOMContentLoaded", () => {
        MembersHoursPage.init();
    });
</script>
</body>
</html>
