{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Confirmă noua parolă</title>
    <link rel="stylesheet" href="{% static 'css/password.css' %}">
</head>
<body>
    <header>
        <h1>Pontaj App</h1>
    </header>
    <div class="auth-container">
        {% if validlink %}
            <h2>Alege o parolă nouă</h2>
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit">Schimbă parola</button>
            </form>
        {% else %}
            <h2>Link invalid</h2>
            <p>Link-ul de resetare a parolei este invalid sau a expirat. Te rugăm să soliciți unul nou.</p>
            <a href="{% url 'password_reset' %}">Cere un link nou</a>
        {% endif %}
    </div>
</body>
</html>
