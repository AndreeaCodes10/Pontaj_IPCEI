{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" href="{% static 'css/letter-p.png' %}">

<title>My Entries</title>

<link rel="stylesheet" href="{% static 'css/styles.css' %}">

<script src="{% static 'api/labs.js' %}"></script>
<script src="{% static 'api/export.js' %}"></script>
<script src="{% static 'api/auth.js' %}"></script>

<script src="{% static 'api/entries.js' %}"></script>
<script src="{% static 'api/calendar.js' %}"></script>
<script src="{% static 'api/members.js' %}"></script>

</head>

<body>

<header class="topbar">

    <h1 class="app-title">Pontaj App</h1>

    <div id="authArea" class="auth-area">
        <button onclick="window.location.href='/api/app'" class="btn-secondary">
        ← Back to Dashboard</button>
        <span id="authUser" class="auth-user"></span>
        <span id="authRole" class="auth-role"></span>
        <button class="logout-btn" id="logoutBtn">
            <img src="{% static 'icons/logout.png' %}" alt="Logout" class="logout-icon">
        </button>
    </div>

</header>


<div class="entries-layout">

            <div class="entries-card">

                <h2>My Monthly Entries</h2>

                <div class="filters-row">

                    <div class="form-group">
                        <label for="lab">Lab</label>
                        <select id="lab"></select>
                    </div>

                    <div class="form-group">
                        <label for="monthSelect">Month</label>
                        <input type="month" id="monthSelect">
                    </div>
                </div>
                <div id="userEntries"></div>
            </div>

</div>

<footer>
© 2026 Pontaj App · Built for lab tracking in IPCEI project
</footer>

<script src="{% static 'api/entriesPage.js' %}"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {
    EntriesPage.init();
});
</script>
</body>
</html>
