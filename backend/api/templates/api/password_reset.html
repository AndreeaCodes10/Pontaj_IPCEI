{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Resetare Parolă</title>
    <link rel="stylesheet" href="{% static 'css/password.css' %}">
</head>

<body>
    <header>
        <h1>Pontaj App</h1>
    </header>
    
    <div class="auth-container">
        <h2>Resetare Parolă</h2>
        <p>Introdu adresa de email pentru a primi un link de resetare a parolei.</p>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Trimite link resetare</button>
        </form>
    </div>
</body>
</html>
